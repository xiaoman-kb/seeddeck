name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    name: Typecheck, test, and build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build desktop app
        run: npm run desktop:build
